<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Top Up</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0c2b33;
color:white;
margin:0;
padding:0;
}

.header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
background:#0e3a43;
}

.tabs{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
}

.tab{
background:white;
color:black;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.tab.active{
background:#00c6d1;
color:white;
}

.pack-container{
padding:15px;
}

.pack{
background:white;
color:black;
padding:15px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.pack.active{
background:#00c6d1;
color:white;
}

.price{
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">MLBB Diamonds Top Up</div>

<div class="tabs" id="tabs"></div>

<div class="pack-container" id="packs"></div>

<script>

const data = {

"Small Pack":[
{name:"3 Diamonds",price:"₹8"},
{name:"5 Diamonds",price:"₹10"},
{name:"11 Diamonds",price:"₹17"},
{name:"14 Diamonds",price:"₹27"},
{name:"22 Diamonds",price:"₹32"},
{name:"55 Diamonds",price:"₹75"}
],

"Normal Pack":[
{name:"86 Diamonds",price:"₹120"},
{name:"110 Diamonds",price:"₹155"},
{name:"165 Diamonds",price:"₹225"},
{name:"172 Diamonds",price:"₹232"},
{name:"257 Diamonds",price:"₹335"},
{name:"275 Diamonds",price:"₹355"},
{name:"343 Diamonds",price:"₹450"},
{name:"429 Diamonds",price:"₹570"},
{name:"514 Diamonds",price:"₹670"},
{name:"565 Diamonds",price:"₹730"},
{name:"600 Diamonds",price:"₹785"},
{name:"706 Diamonds",price:"₹910"},
{name:"792 Diamonds",price:"₹1025"},
{name:"878 Diamonds",price:"₹1135"},
{name:"963 Diamonds",price:"₹1240"}
],

"Large Pack":[
{name:"1049 Diamonds",price:"₹1360"},
{name:"1130 Diamonds",price:"₹1455"},
{name:"1412 Diamonds",price:"₹1810"},
{name:"2195 Diamonds",price:"₹2740"},
{name:"2901 Diamonds",price:"₹3650"},
{name:"3688 Diamonds",price:"₹4570"},
{name:"5532 Diamonds",price:"₹6870"},
{name:"9288 Diamonds",price:"₹11450"}
],

"Bonus Pack":[
{name:"100 Diamonds (50+50)",price:"₹75"},
{name:"300 Diamonds (150+150)",price:"₹225"},
{name:"500 Diamonds (250+250)",price:"₹355"},
{name:"1000 Diamonds (500+500)",price:"₹730"}
],

"Weekly Pass":[
{name:"1x Weekly Pass",price:"₹147"},
{name:"2x Weekly Pass",price:"₹294"},
{name:"3x Weekly Pass",price:"₹441"}
],

"Bundle Pack":[
{name:"Weekly Elite Bundle",price:"₹75"},
{name:"Monthly Epic Bundle",price:"₹380"}
]

};

const tabsDiv = document.getElementById("tabs");
const packsDiv = document.getElementById("packs");

let currentCategory = Object.keys(data)[0];

function renderTabs(){

tabsDiv.innerHTML="";

Object.keys(data).forEach(cat=>{

const tab=document.createElement("div");
tab.className="tab";
tab.innerText=cat;

if(cat===currentCategory) tab.classList.add("active");

tab.onclick=()=>{
currentCategory=cat;
renderTabs();
renderPacks();
};

tabsDiv.appendChild(tab);

});

}

function renderPacks(){

packsDiv.innerHTML="";

data[currentCategory].forEach(pack=>{

const div=document.createElement("div");
div.className="pack";

div.innerHTML=`
<span>${pack.name}</span>
<span class="price">${pack.price}</span>
`;

div.onclick=()=>{
document.querySelectorAll(".pack").forEach(p=>p.classList.remove("active"));
div.classList.add("active");
};

packsDiv.appendChild(div);

});

}

renderTabs();
renderPacks();

</script>

</body>
</html>
