<!DOCTYPE html>
<html>

<head>
<title>OMEGA STORE</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:cyan;
margin-top:30px;
}

.gamebtn{
background:#111;
border:1px solid cyan;
color:white;
padding:12px 25px;
margin:10px;
border-radius:8px;
font-size:16px;
}

.packbox{
background:#111;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px cyan;
}

button{
background:cyan;
border:none;
padding:10px 20px;
border-radius:5px;
font-weight:bold;
}

#mlbb,#pubg,#ff{
display:none;
}

</style>
</head>

<body>

<h1>OMEGA STORE</h1>
<p>Select a Game</p>

<button class="gamebtn" onclick="showGame('mlbb')">MLBB</button>
<button class="gamebtn" onclick="showGame('pubg')">PUBG</button>
<button class="gamebtn" onclick="showGame('ff')">Free Fire</button>

<!-- MLBB PACKS -->

<div id="mlbb">

<h2>MLBB Diamond Packs</h2>

<div class="packbox">
<h3>86 Diamonds</h3>
<p>₹80</p>
<a href="https://wa.me/916033823642">
<button>Order</button>
</a>
</div>

<div class="packbox">
<h3>172 Diamonds</h3>
<p>₹150</p>
<a href="https://wa.me/916033823642">
<button>Order</button>
</a>
</div>

<div class="packbox">
<h3>Weekly Diamond Pass</h3>
<p>₹160</p>
<a href="https://wa.me/916033823642">
<button>Order</button>
</a>
</div>

</div>

<!-- PUBG PACKS -->

<div id="pubg">

<h2>PUBG UC Packs</h2>

<div class="packbox">
<h3>60 UC</h3>
<p>₹70</p>
<a href="https://wa.me/916033823642">
<button>Order</button>
</a>
</div>

<div class="packbox">
<h3>325 UC</h3>
<p>₹350</p>
<a href="https://wa.me/916033823642">
<button>Order</button>
</a>
</div>

</div>

<!-- FREE FIRE PACKS -->

<div id="ff">

<h2>Free Fire Diamond Packs</h2>

<div class="packbox">
<h3>100 Diamonds</h3>
<p>₹80</p>
<a href="https://wa.me/916033823642">
<button>Order</button>
</a>
</div>

</div>

<script>

function showGame(game){

document.getElementById("mlbb").style.display="none";
document.getElementById("pubg").style.display="none";
document.getElementById("ff").style.display="none";

document.getElementById(game).style.display="block";

}

</script>

</body>
</html>
