<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLBB Top Up</title>

<style>

body{
font-family:Arial;
background:#0d2c35;
margin:0;
color:white;
}

header{
background:#123c46;
padding:15px;
display:flex;
align-items:center;
}

.home{
background:#00c6d1;
border:none;
padding:8px 12px;
color:white;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

.banner{
padding:20px;
text-align:center;
background:#1d4c57;
}

.tabs{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
}

.tab{
background:white;
color:black;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.tab.active{
background:#00c6d1;
color:white;
}

.container{
padding:15px;
}

.pack{
background:white;
color:black;
padding:14px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.pack.active{
background:#00c6d1;
color:white;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:none;
}

.order{
width:100%;
padding:14px;
background:#00c6d1;
border:none;
color:white;
margin-top:20px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<button class="home" onclick="location.reload()">Home</button>
<h3>Omega MLBB Store</h3>
</header>

<div class="banner">
<h2>Mobile Legends Diamonds</h2>
</div>

<div class="tabs" id="tabs"></div>

<div class="container">

<div id="packs"></div>

<h4>ID</h4>
<input type="text" id="player">

<h4>SERVER ID</h4>
<input type="text" id="server">

<button class="order" onclick="order()">ORDER NOW</button>

</div>

<script>

let selectedPack=null

const data={

"Small Pack":[
["3💎","₹8"],
["5💎","₹10"],
["11💎","₹17"],
["14💎","₹27"],
["22💎","₹32"],
["55💎","₹75"]
],

"Normal Pack":[
["86💎","₹120"],
["110💎","₹155"],
["165💎","₹225"],
["172💎","₹232"],
["257💎","₹335"],
["275💎","₹355"],
["343💎","₹450"]
],

"Large Pack":[
["1049💎","₹1360"],
["1130💎","₹1455"],
["1412💎","₹1810"],
["2195💎","₹2740"],
["2901💎","₹3650"],
["3688💎","₹4570"],
["5532💎","₹6870"],
["9288💎","₹11450"]
],

"Bonus Pack":[
["100💎","₹75"],
["300💎","₹225"],
["500💎","₹355"],
["1000💎","₹730"]
],

"Weekly Pass":[
["1x Weekly Pass","₹147"],
["2x Weekly Pass","₹294"],
["3x Weekly Pass","₹441"]
],

"Bundle":[
["Weekly Elite Bundle","₹75"],
["Monthly Epic Bundle","₹380"]
]

}

let current=Object.keys(data)[0]

const tabs=document.getElementById("tabs")
const packs=document.getElementById("packs")

function renderTabs(){

tabs.innerHTML=""

Object.keys(data).forEach(cat=>{

let t=document.createElement("div")
t.className="tab"
t.innerText=cat

if(cat==current) t.classList.add("active")

t.onclick=()=>{
current=cat
renderTabs()
renderPacks()
}

tabs.appendChild(t)

})

}

function renderPacks(){

packs.innerHTML=""

data[current].forEach(p=>{

let d=document.createElement("div")
d.className="pack"

d.innerHTML=p[0]+" <b>"+p[1]+"</b>"

d.onclick=()=>{
document.querySelectorAll(".pack").forEach(x=>x.classList.remove("active"))
d.classList.add("active")
selectedPack=p
}

packs.appendChild(d)

})

}

function order(){

let id=document.getElementById("player").value
let server=document.getElementById("server").value

if(!selectedPack){
alert("Select pack first")
return
}

alert("Order: "+selectedPack[0]+" "+selectedPack[1]+"\nID:"+id+"\nServer:"+server)

}

renderTabs()
renderPacks()

</script>

</body>
</html>
