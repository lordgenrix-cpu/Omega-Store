<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMEGA STORE</title>

<style>

body{
font-family: Arial;
margin:0;
background:#0f0f0f;
color:white;
}

.header{
display:flex;
align-items:center;
justify-content:center;
padding:15px;
background:#111;
font-weight:bold;
font-size:20px;
position:relative;
}

.menu-btn{
position:absolute;
left:15px;
font-size:24px;
cursor:pointer;
}

.search-box{
padding:15px;
text-align:center;
}

.search-box input{
width:90%;
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
}

.slider{
width:100%;
overflow:hidden;
}

.slides{
display:flex;
animation:slide 12s infinite;
}

.slides img{
width:100%;
height:180px;
object-fit:cover;
}

@keyframes slide{
0%{transform:translateX(0)}
33%{transform:translateX(-100%)}
66%{transform:translateX(-200%)}
100%{transform:translateX(0)}
}

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#1b1b1b;
overflow-x:hidden;
transition:0.3s;
padding-top:20px;
}

.sidebar a{
padding:12px 20px;
text-decoration:none;
color:white;
display:block;
}

.sidebar a:hover{
background:#333;
}

.divider{
height:1px;
background:#444;
margin:10px 0;
}

.logout{
color:red;
}

.content{
padding:20px;
text-align:center;
}

</style>
</head>

<body>

<div id="menu" class="sidebar">

<a href="#">Home</a>
<a href="orders.html">Orders</a>

<div class="divider"></div>

<a href="https://wa.me/916033823642">Support</a>
<a href="#" onclick="showTerms()">Terms & Conditions</a>
<a href="#" onclick="showRefund()">Refund Policy</a>

<div class="divider"></div>

<a href="#" class="logout">⏻ Logout</a>

</div>

<div class="header">
<span class="menu-btn" onclick="toggleMenu()">☰</span>
OMEGA STORE
</div>

<div class="search-box">
<input type="text" placeholder="Search games or products...">
</div>

<div class="slider">
<div class="slides">

<img src="https://picsum.photos/400/200?1">
<img src="https://picsum.photos/400/200?2">
<img src="https://picsum.photos/400/200?3">

</div>
</div>

<div class="content">
<h3>Game Services</h3>
<p>Your games will appear here later.</p>
</div>

<script>

function toggleMenu(){
let menu=document.getElementById("menu");

if(menu.style.width==="50%"){
menu.style.width="0";
}
else{
menu.style.width="50%";
}
}

function showTerms(){
alert("Terms & Conditions:\n\nAll purchases are final. Please make sure your game ID is correct before placing orders.");
}

function showRefund(){
alert("Refund Policy:\n\nRefunds will only be provided if the order fails or cannot be delivered.");
}

</script>

</body>
</html>
