<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Top Up</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0b2c33;
color:white;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:#0e3a43;
padding:15px;
}

.home-btn{
background:#00c6d1;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
color:white;
}

.title{
font-size:18px;
font-weight:bold;
}

.tabs{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.tab{
background:white;
color:black;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
white-space:nowrap;
}

.tab.active{
background:#00c6d1;
color:white;
}

.container{
padding:15px;
}

.pack{
background:white;
color:black;
padding:14px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.pack.active{
background:#00c6d1;
color:white;
}

.field{
margin-top:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:5px;
}

.order{
margin-top:25px;
width:100%;
padding:14px;
border:none;
background:#00c6d1;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<button class="home-btn" onclick="goHome()">Home</button>
<div class="title">MLBB Diamonds Top Up</div>
<div></div>
</div>

<div class="tabs" id="tabs"></div>

<div class="container">

<div id="packs"></div>

<div class="field">
<label>ID</label>
<input type="text" id="playerID" placeholder="Enter Player ID">
</div>

<div class="field">
<label>SERVER ID</label>
<input type="text" id="serverID" placeholder="Enter Server ID">
</div>

<button class="order" onclick="orderNow()">ORDER NOW</button>

</div>

<script>

let selectedPack=null

const data={

"SMALL PACK":[
{name:"3 Diamonds",price:"₹8"},
{name:"5 Diamonds",price:"₹10"},
{name:"11 Diamonds",price:"₹17"},
{name:"14 Diamonds",price:"₹27"},
{name:"22 Diamonds",price:"₹32"},
{name:"55 Diamonds",price:"₹75"}
],

"NORMAL PACK":[
{name:"86 Diamonds",price:"₹120"},
{name:"110 Diamonds",price:"₹155"},
{name:"165 Diamonds",price:"₹225"},
{name:"172 Diamonds",price:"₹232"},
{name:"257 Diamonds",price:"₹335"},
{name:"275 Diamonds",price:"₹355"},
{name:"343 Diamonds",price:"₹450"},
{name:"429 Diamonds",price:"₹570"},
{name:"514 Diamonds",price:"₹670"},
{name:"565 Diamonds",price:"₹730"},
{name:"600 Diamonds",price:"₹785"},
{name:"706 Diamonds",price:"₹910"},
{name:"792 Diamonds",price:"₹1025"},
{name:"878 Diamonds",price:"₹1135"},
{name:"963 Diamonds",price:"₹1240"}
],

"LARGE PACK":[
{name:"1049 Diamonds",price:"₹1360"},
{name:"1130 Diamonds",price:"₹1455"},
{name:"1412 Diamonds",price:"₹1810"},
{name:"2195 Diamonds",price:"₹2740"},
{name:"2901 Diamonds",price:"₹3650"},
{name:"3688 Diamonds",price:"₹4570"},
{name:"5532 Diamonds",price:"₹6870"},
{name:"9288 Diamonds",price:"₹11450"}
],

"BONUS PACK":[
{name:"100 Diamonds (50+50)",price:"₹75"},
{name:"300 Diamonds (150+150)",price:"₹225"},
{name:"500 Diamonds (250+250)",price:"₹355"},
{name:"1000 Diamonds (500+500)",price:"₹730"}
],

"WEEKLY PASS PACK":[
{name:"1x Weekly Pass",price:"₹147"},
{name:"2x Weekly Pass",price:"₹294"},
{name:"3x Weekly Pass",price:"₹441"}
],

"BUNDLE PACK":[
{name:"Weekly Elite Bundle",price:"₹75"},
{name:"Monthly Epic Bundle",price:"₹380"}
]

}

let current=Object.keys(data)[0]

const tabs=document.getElementById("tabs")
const packs=document.getElementById("packs")

function renderTabs(){

tabs.innerHTML=""

Object.keys(data).forEach(cat=>{

let tab=document.createElement("div")
tab.className="tab"
tab.innerText=cat

if(cat===current) tab.classList.add("active")

tab.onclick=()=>{
current=cat
renderTabs()
renderPacks()
}

tabs.appendChild(tab)

})

}

function renderPacks(){

packs.innerHTML=""

data[current].forEach(pack=>{

let div=document.createElement("div")
div.className="pack"
div.innerHTML=`${pack.name} <b>${pack.price}</b>`

div.onclick=()=>{
document.querySelectorAll(".pack").forEach(p=>p.classList.remove("active"))
div.classList.add("active")
selectedPack=pack
}

packs.appendChild(div)

})

}

function orderNow(){

let id=document.getElementById("playerID").value
let server=document.getElementById("serverID").value

if(!selectedPack){
alert("Select a pack first")
return
}

if(id=="" || server==""){
alert("Enter ID and Server ID")
return
}

alert(
"ORDER DETAILS\n\n"+
selectedPack.name+" - "+selectedPack.price+
"\nID: "+id+
"\nServer: "+server
)

}

function goHome(){
location.reload()
}

renderTabs()
renderPacks()

</script>

</body>
</html>
